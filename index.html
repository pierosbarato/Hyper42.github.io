<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            margin: 0;
            padding: 20px;
            background-color: blue;
            font-family: sans-serif;
        }

        .container {
            display: flex;
            gap: 20px; /* Spazio tra i due iframe */
            height: 80vh; /* Altezza del contenitore */
        }

        iframe {
            flex: 1; /* Divide lo spazio equamente */
            width: 100%;
            border: 2px solid #ccc;
            border-radius: 8px;
        }

        /* Regola per mobile (iOS e altri smartphone) */
        @media (max-width: 768px) {
            .container {
                flex-direction: column; /* Dispone gli elementi in verticale */
                height: auto;
            }

            iframe {
                height: 400px; /* Altezza fissa quando sono impilati */
            }
        }
    </style>
</head>
<body>

    <h2>Iframe Responsive</h2>

    <div class="container">
        <iframe src="https://gqqhfd4g5qkxfmw73tf3sl4vgm0htxff.lambda-url.eu-central-1.on.aws/prompt.html" title="Item"></iframe>
        <iframe src="https://gqqhfd4g5qkxfmw73tf3sl4vgm0htxff.lambda-url.eu-central-1.on.aws/formula.html" title="Formula"></iframe>
    </div>

</body>
</html>
